services:
  # 1. Backend FastAPI Service
  - type: web
    name: samsung-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MOCK_ROS
        value: "True"
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: 3.11.9

  # 2. Frontend Static React Site
  - type: web
    name: samsung-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: samsung-backend
          type: web
          property: url
